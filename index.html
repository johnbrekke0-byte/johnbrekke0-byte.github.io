<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ImpreSSion</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #8B5CF6; --blue: #3B82F6; --green: #10B981;
    --orange: #F97316; --yellow: #F59E0B; --red: #EF4444;
    --bg: #F3F4F6; --card: #FFFFFF; --text: #111827;
    --muted: #6B7280; --border: #E5E7EB;
    --radius: 14px; --tab-h: 60px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; justify-content: center;
  }

  #app {
    width: 100%; max-width: 430px;
    display: flex; flex-direction: column;
    min-height: 100dvh; position: relative;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; height: var(--tab-h);
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; border: none; background: none;
    cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 500;
    transition: color .15s;
  }
  .tab-btn svg { width: 24px; height: 24px; }
  .tab-btn.active { color: var(--blue); }

  /* ── SCROLLABLE CONTENT ── */
  .screen { padding-bottom: calc(var(--tab-h) + 12px); min-height: 100dvh; }

  /* ── STREAK BANNER ── */
  .streak-banner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .streak-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(249,115,22,.1); border-radius: 100px;
    padding: 6px 12px;
  }
  .streak-pill span:first-child { font-size: 20px; }
  .streak-pill .streak-num { font-size: 16px; font-weight: 700; }
  .streak-pill .streak-label { font-size: 11px; color: var(--muted); }
  .xp-info { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .xp-row { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
  .xp-row span:first-child { color: var(--yellow); font-size: 12px; }
  .xp-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .xp-bar { height: 100%; background: var(--yellow); border-radius: 99px; transition: width .4s ease; }
  .gear-btn {
    background: none; border: none; cursor: pointer; font-size: 20px;
    padding: 6px; border-radius: 99px; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── CATEGORY SECTION ── */
  .category-section { padding: 20px 16px 0; }
  .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .category-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; }
  .cat-pct { font-size: 12px; color: var(--muted); }
  .cat-progress { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .cat-progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

  /* ── CHARACTER GRID ── */
  .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 12px; }
  .char-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; background: none; border: none; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .char-avatar {
    width: 70px; height: 70px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 34px;
    position: relative; transition: transform .1s;
  }
  .char-card:active .char-avatar { transform: scale(.94); }
  .char-avatar.locked::after {
    content: '🔒'; position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,.5); display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }
  .char-avatar.completed { box-shadow: 0 0 0 3px var(--yellow); }
  .char-check {
    position: absolute; bottom: 0; right: 0; width: 22px; height: 22px;
    background: var(--yellow); border-radius: 50%; border: 2px solid white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .char-name { font-size: 11px; font-weight: 600; text-align: center; line-height: 1.3; color: var(--text); width: 80px; }
  .char-name.muted { color: var(--muted); }
  .char-sub { font-size: 10px; }
  .char-score-green { color: var(--green); }
  .char-score-orange { color: var(--orange); }
  .difficulty-dots { display: flex; gap: 3px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .unlock-xp { color: var(--muted); display: flex; align-items: center; gap: 2px; }

  /* ── PRACTICE SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 200; display: flex; align-items: flex-end;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .sheet {
    width: 100%; max-width: 430px; margin: 0 auto;
    background: white; border-radius: 24px 24px 0 0;
    max-height: 92dvh; overflow-y: auto;
    animation: slideUp .3s cubic-bezier(.32,1,.23,1);
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 0; }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .phase-dots { display: flex; gap: 6px; }
  .phase-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .phase-dot.active { background: var(--blue); }
  .close-btn {
    background: var(--bg); border: none; border-radius: 99px;
    padding: 6px 12px; font-size: 14px; cursor: pointer; color: var(--muted);
  }

  /* ── TIPS SCREEN ── */
  .tips-body { padding: 20px 16px; }
  .char-hero { text-align: center; padding: 12px 0 20px; }
  .char-hero .emoji { font-size: 72px; line-height: 1; }
  .char-hero h2 { font-size: 26px; font-weight: 800; margin: 8px 0 6px; }
  .diff-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 99px;
  }
  .section-card { background: var(--bg); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .section-label { font-size: 14px; font-weight: 700; padding: 12px 14px 6px; }
  .trait-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-top: 1px solid var(--border); }
  .trait-icon { font-size: 20px; width: 28px; flex-shrink: 0; text-align: center; margin-top: 2px; }
  .trait-name { font-size: 13px; font-weight: 600; }
  .trait-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .phrase-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); font-size: 13px; font-style: italic; }

  /* ── LISTEN SCREEN ── */
  .listen-body { padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 20px; min-height: 400px; }
  .phrase-card { width: 100%; background: var(--bg); border-radius: var(--radius); padding: 16px; text-align: center; }
  .phrase-text { font-size: 18px; font-style: italic; font-weight: 500; margin-bottom: 8px; }
  .phrase-hint { font-size: 12px; color: var(--muted); }
  .play-btn {
    display: flex; align-items: center; gap: 10px; background: none; border: none;
    cursor: pointer; font-size: 16px; font-weight: 600; color: var(--blue);
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn svg { width: 52px; height: 52px; }
  .play-btn.playing { color: var(--orange); }
  .play-count { font-size: 12px; color: var(--muted); }
  .loading-audio { display: flex; align-items: center; gap: 10px; color: var(--blue); font-size: 15px; font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
  .el-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--purple); font-weight: 600; background: rgba(139,92,246,.1); padding: 3px 8px; border-radius: 99px; }

  /* ── RECORD SCREEN ── */
  .record-body { padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 20px; min-height: 400px; }
  .waveform-canvas { width: 100%; height: 60px; }
  .timer { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); }
  .mic-btn {
    width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    transition: transform .1s, box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn.idle { background: var(--blue); box-shadow: 0 6px 20px rgba(59,130,246,.4); }
  .mic-btn.recording {
    background: var(--red); box-shadow: 0 6px 20px rgba(239,68,68,.4);
    animation: pulse-mic .8s ease-in-out infinite alternate;
  }
  @keyframes pulse-mic { to { transform: scale(1.1); } }
  .post-record-actions { display: flex; gap: 16px; }
  .ghost-btn {
    display: flex; align-items: center; gap: 6px; background: var(--bg);
    border: none; border-radius: 99px; padding: 8px 16px; cursor: pointer;
    font-size: 13px; -webkit-tap-highlight-color: transparent;
  }
  .error-msg { color: var(--red); font-size: 13px; text-align: center; }

  /* ── ANALYZING ── */
  .analyzing-body { padding: 48px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .analyze-icon { font-size: 56px; animation: breathe 1.2s ease-in-out infinite alternate; }
  @keyframes breathe { to { transform: scale(1.15); opacity: .7; } }
  .analyzing-body h2 { font-size: 22px; font-weight: 700; }
  .analyzing-body p { color: var(--muted); font-size: 14px; }

  /* ── RESULT SCREEN ── */
  .result-body { padding: 20px 16px; }
  .result-header { text-align: center; padding: 12px 0 20px; }
  .result-emoji { font-size: 52px; }
  .result-header h2 { font-size: 22px; font-weight: 800; margin: 8px 0; }
  .new-best-badge {
    display: inline-block; background: rgba(245,158,11,.15);
    color: var(--yellow); font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 99px;
  }
  .score-ring-wrap { display: flex; justify-content: center; margin: 4px 0 16px; }
  .score-ring { width: 140px; height: 140px; }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 12; }
  .score-ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 70px 70px; transition: stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1); }
  .score-ring-text { font-size: 36px; font-weight: 800; dominant-baseline: middle; text-anchor: middle; }
  .score-ring-sub { font-size: 12px; fill: var(--muted); dominant-baseline: middle; text-anchor: middle; }
  .xp-earned-pill {
    display: flex; align-items: center; gap: 8px; justify-content: center;
    background: rgba(245,158,11,.12); border-radius: 99px;
    padding: 8px 18px; font-size: 15px; font-weight: 700; margin-bottom: 16px;
  }
  .score-breakdown { background: var(--bg); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .score-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .score-row:last-child { border-bottom: none; }
  .score-icon { font-size: 16px; width: 24px; text-align: center; }
  .score-label { font-size: 14px; flex: 1; }
  .score-bar-wrap { width: 80px; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 99px; transition: width .8s ease; }
  .score-num { font-size: 13px; color: var(--muted); width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
  .feedback-card { background: var(--bg); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
  .feedback-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .feedback-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .feedback-item:last-child { margin-bottom: 0; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .primary-btn {
    flex: 1; background: var(--blue); color: white; border: none;
    border-radius: var(--radius); padding: 14px; font-size: 15px;
    font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .secondary-btn {
    flex: 1; background: var(--bg); color: var(--text); border: none;
    border-radius: var(--radius); padding: 14px; font-size: 14px;
    font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .action-row { display: flex; gap: 10px; margin-top: 10px; }

  /* ── PROFILE SCREEN ── */
  .profile-screen { padding: 0 0 calc(var(--tab-h) + 12px); }
  .profile-hero { background: linear-gradient(135deg, var(--purple), var(--blue)); padding: 32px 20px; text-align: center; color: white; }
  .profile-avatar { width: 80px; height: 80px; background: rgba(255,255,255,.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; }
  .profile-hero h2 { font-size: 20px; font-weight: 800; }
  .profile-hero p { opacity: .8; font-size: 14px; margin-top: 4px; }
  .profile-xp-bar { margin: 12px 0 0; }
  .profile-xp-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; opacity: .9; }
  .profile-xp-track { height: 8px; background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden; }
  .profile-xp-fill { height: 100%; background: white; border-radius: 99px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 16px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .section-title { font-size: 16px; font-weight: 700; padding: 4px 16px 10px; }
  .bests-card { margin: 0 16px 16px; background: var(--card); border-radius: var(--radius); overflow: hidden; }
  .best-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .best-row:last-child { border-bottom: none; }
  .best-score-green { color: var(--green); font-weight: 700; margin-left: auto; }
  .best-score-orange { color: var(--orange); font-weight: 700; margin-left: auto; }
  .cat-progress-card { margin: 0 16px 16px; background: var(--card); border-radius: var(--radius); padding: 14px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-row-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .cat-row-fill { height: 100%; border-radius: 99px; }
  .cat-row-pct { font-size: 12px; color: var(--muted); width: 30px; text-align: right; }

  /* ── SETTINGS ── */
  .settings-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; background: white; color: var(--text);
    outline: none;
  }
  .settings-input:focus { border-color: var(--blue); }
  .voice-select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; background: white; color: var(--text);
    margin-top: 6px; outline: none;
  }
  .voice-select:focus { border-color: var(--purple); }
  .settings-note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 6px; }
  .settings-note a { color: var(--blue); }

  /* ── UTILS ── */
  .full-btn {
    display: block; width: calc(100% - 32px); margin: 0 16px;
    background: var(--blue); color: white; border: none; border-radius: var(--radius);
    padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .full-btn:disabled { background: var(--border); color: var(--muted); }
  .spacer { height: 20px; }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">

// ─── DATA ────────────────────────────────────────────────────────────────────

const REQUIRED_SCORE = { beginner:50, intermediate:65, advanced:75 };
const XP_REWARD      = { beginner:10, intermediate:20, advanced:35 };

// ─── PROGRESS ────────────────────────────────────────────────────────────────

function loadProgress() {
  try {
    const d = localStorage.getItem('impression_v1');
    if (d) return JSON.parse(d);
  } catch {}
  return { xp:0, streak:0, lastDate:null, completed:{}, scores:{} };
}

function saveProgress(p) {
  localStorage.setItem('impression_v1', JSON.stringify(p));
}

function recordResult(char, score) {
  const p = state.progress;
  const diff = char.difficulty;
  const prev = p.scores[char.id] ?? 0;
  const isNew = score > prev;
  if (score >= REQUIRED_SCORE[diff]) p.completed[char.id] = true;
  if (isNew) p.scores[char.id] = score;
  const xp = Math.round(XP_REWARD[diff] * score / 100) + (isNew ? Math.round(XP_REWARD[diff] / 2) : 0);
  p.xp += xp;

  const today = new Date().toDateString();
  if (p.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    p.streak = p.lastDate === yesterday ? p.streak + 1 : 1;
    p.lastDate = today;
  }
  saveProgress(p);
  return { xp, isNew };
}

function isUnlocked(char) { return state.progress.xp >= char.unlockXP; }
function isCompleted(char) { return !!state.progress.completed[char.id]; }
function catPct(catId) {
  const chars = CHARACTERS.filter(c => c.category === catId);
  return chars.filter(c => isCompleted(c)).length / chars.length;
}
function xpProgress() { return (state.progress.xp % 100) / 100; }
function level() { return Math.max(1, Math.floor(state.progress.xp / 100)); }

// ─── ELEVENLABS ──────────────────────────────────────────────────────────────

const EL_BASE = 'https://api.elevenlabs.io/v1';

async function elFetchVoices(apiKey) {
  const r = await fetch(`${EL_BASE}/voices`, {
    headers: { 'xi-api-key': apiKey }
  });
  if (!r.ok) throw new Error('Invalid API key');
  const data = await r.json();
  return (data.voices || []).sort((a, b) => a.name.localeCompare(b.name));
}

async function elSynthesize(voiceId, text) {
  const r = await fetch(`${EL_BASE}/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: { 'xi-api-key': state.apiKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      model_id: 'eleven_monolingual_v1',
      voice_settings: { stability: 0.45, similarity_boost: 0.80, style: 0.35 }
    })
  });
  if (!r.ok) throw new Error('TTS failed');
  return r.blob();
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────

async function speakPhrase(char, phraseIdx) {
  const phrase = char.phrases[phraseIdx];
  const voiceId = state.charVoiceMap[char.id];

  if (state.apiKey && voiceId) {
    const cacheKey = `${char.id}_${phraseIdx}`;
    try {
      let blobUrl = state.audioCache[cacheKey];
      if (!blobUrl) {
        const blob = await elSynthesize(voiceId, phrase.text);
        blobUrl = URL.createObjectURL(blob);
        state.audioCache[cacheKey] = blobUrl;
      }
      const audio = new Audio(blobUrl);
      state.currentAudio = audio;
      audio.onended = () => {
        if (state.sheet) { state.sheet.isPlaying = false; }
        state.currentAudio = null;
        renderSheet();
      };
      audio.play();
      return 'el';
    } catch (e) {
      console.error('ElevenLabs TTS error:', e);
    }
  }

  // Web Speech fallback
  const utt = new SpeechSynthesisUtterance(phrase.text);
  utt.lang = char.lang || 'en-US';
  utt.rate = { slow:0.75, normal:1.0, fast:1.3 }[char.rate];
  const mid = (char.pitchLow + char.pitchHigh) / 2;
  utt.pitch = Math.max(0.5, Math.min(2, mid / 200));
  speechSynthesis.cancel();
  utt.onend = () => {
    if (state.sheet) { state.sheet.isPlaying = false; }
    renderSheet();
  };
  speechSynthesis.speak(utt);
  return 'web';
}

function stopAudio() {
  speechSynthesis.cancel();
  if (state.currentAudio) { state.currentAudio.pause(); state.currentAudio = null; }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioCtx.createMediaStreamSource(stream);
    state.analyserNode = state.audioCtx.createAnalyser();
    state.analyserNode.fftSize = 256;
    source.connect(state.analyserNode);

    state.audioChunks = [];
    state.recordingBlob = null;
    state.mediaRecorder = new MediaRecorder(stream);
    state.mediaRecorder.ondataavailable = e => state.audioChunks.push(e.data);
    state.mediaRecorder.onstop = () => {
      state.recordingBlob = new Blob(state.audioChunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
    };
    state.mediaRecorder.start();
    state.isRecording = true;
    state.recDuration = 0;
    state.recTimer = setInterval(() => { state.recDuration += 0.1; renderSheet(); }, 100);
    startWaveform();
    renderSheet();
  } catch (e) {
    alert('Microphone access denied. Please allow mic access and try again.');
  }
}

function stopRecording() {
  if (!state.mediaRecorder) return;
  state.mediaRecorder.stop();
  state.isRecording = false;
  clearInterval(state.recTimer);
  cancelAnimationFrame(state.canvasRAF);
  renderSheet();
}

function startWaveform() {
  const canvas = document.getElementById('waveCanvas');
  if (!canvas || !state.analyserNode) return;
  const bufLen = state.analyserNode.frequencyBinCount;
  const data = new Uint8Array(bufLen);

  function draw() {
    state.canvasRAF = requestAnimationFrame(draw);
    const c = document.getElementById('waveCanvas');
    if (!c) { cancelAnimationFrame(state.canvasRAF); return; }
    const cx = c.getContext('2d');
    const W = c.width, H = c.height;
    state.analyserNode.getByteTimeDomainData(data);
    cx.clearRect(0, 0, W, H);
    const barW = 3, gap = 3;
    const total = Math.floor(W / (barW + gap));
    const step = Math.floor(bufLen / total);
    cx.fillStyle = '#EF4444';
    for (let i = 0; i < total; i++) {
      const v = (data[i * step] / 128 - 1);
      const h = Math.max(4, Math.abs(v) * H * 2.5);
      const x = i * (barW + gap);
      cx.beginPath();
      cx.roundRect(x, (H - h) / 2, barW, h, 2);
      cx.fill();
    }
  }
  draw();
}

async function analyzeRecording(char) {
  if (!state.recordingBlob) return null;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await state.recordingBlob.arrayBuffer();
    const audio = await ctx.decodeAudioData(buf);
    const samples = audio.getChannelData(0);
    const n = samples.length;

    let sumSq = 0;
    for (let i = 0; i < n; i++) sumSq += samples[i] * samples[i];
    const rms = Math.sqrt(sumSq / n);

    let zc = 0;
    for (let i = 1; i < n; i++) if ((samples[i] >= 0) !== (samples[i-1] >= 0)) zc++;
    const zcr = zc / n;
    const pitch = zcr * audio.sampleRate / 2;

    const duration = audio.duration;

    const targetPitch = (char.pitchLow + char.pitchHigh) / 2;
    const tolerance = (char.pitchHigh - char.pitchLow) / 2;
    const pitchScore = Math.round(Math.max(0, 1 - Math.abs(pitch - targetPitch) / (tolerance * 2)) * 100);

    const inRange = rms > 0.001 && rms < (char.difficulty === 'advanced' ? 0.1 : 0.05);
    const energyScore = inRange
      ? 70 + Math.floor(Math.random() * 26)
      : 40 + Math.floor(Math.random() * 31);

    const expectedDur = { slow:[2,8], normal:[1.5,6], fast:[1,5] }[char.rate];
    const rhythmScore = duration >= expectedDur[0] && duration <= expectedDur[1]
      ? 65 + Math.floor(Math.random() * 26)
      : duration < expectedDur[0]
        ? 20 + Math.floor(Math.random() * 31)
        : 50 + Math.floor(Math.random() * 26);

    const overall = Math.min(100, Math.max(0,
      Math.round(pitchScore * 0.4 + energyScore * 0.3 + rhythmScore * 0.3)
      + Math.floor(Math.random() * 11) - 5
    ));

    const feedback = [];
    if (pitchScore >= 80) feedback.push('Great pitch match! 🎯');
    else if (pitchScore < 50) feedback.push(`Pitch is off — aim for ${char.pitchDesc}.`);
    if (energyScore >= 80) feedback.push('Excellent vocal energy! 💪');
    else if (energyScore < 50) feedback.push(rms < 0.001 ? 'Speak louder — mic barely picked you up.' : 'Try adjusting your vocal energy.');
    if (rhythmScore >= 80) feedback.push('Your pacing is spot on! ⏱️');
    else if (rhythmScore < 50) feedback.push(char.rate === 'slow' ? `Slow down — ${char.name} speaks deliberately.` : char.rate === 'fast' ? 'Speed it up a bit!' : 'Work on your pacing.');
    if (!feedback.length) feedback.push('Solid impression — keep practicing to nail the nuances!');

    return { overall, pitchScore, energyScore, rhythmScore, feedback };
  } catch { return null; }
}

async function connectElevenLabs(key) {
  state.settingsLoading = true;
  state.settingsError = '';
  render();
  try {
    const voices = await elFetchVoices(key);
    state.apiKey = key;
    state.elVoices = voices;
    localStorage.setItem('el_api_key', key);
    localStorage.setItem('el_voices', JSON.stringify(voices));
    state.settingsLoading = false;
    render();
  } catch (e) {
    state.settingsError = 'Could not connect. Check your API key and try again.';
    state.settingsLoading = false;
    render();
  }
}

function setCharVoice(charId, voiceId) {
  if (voiceId) {
    state.charVoiceMap[charId] = voiceId;
  } else {
    delete state.charVoiceMap[charId];
  }
  localStorage.setItem('el_voice_map', JSON.stringify(state.charVoiceMap));
  // Clear audio cache for this character
  Object.keys(state.audioCache).forEach(k => {
    if (k.startsWith(charId + '_')) delete state.audioCache[k];
  });
}

          ? `<span class="${score >= REQUIRED_SCORE[ch.difficulty]?'char-score-green':'char-score-orange'}">${score}%</span>`

            ? `<span class="unlock-xp">★ ${ch.unlockXP} XP</span>`
            : renderDots(ch.difficulty)

  `;
}

        <div class="section-card">
          <div class="section-label">API Key</div>
          <div class="trait-row" style="border-top:none;flex-direction:column;gap:10px">
            <input id="elApiKeyInput" class="settings-input" type="password"
              placeholder="sk-..."
              value="${state.apiKey}">
            ${state.settingsError ? `<div style="color:var(--red);font-size:12px">${state.settingsError}</div>` : ''}
            <button class="full-btn" data-action="connect-el" style="margin:0;width:100%"
              ${state.settingsLoading ? 'disabled' : ''}>
              ${state.settingsLoading ? 'Connecting…' : hasKey ? '↺ Refresh Voices' : 'Connect ElevenLabs'}
            </button>
            <p class="settings-note">
              1. Sign up free at <strong>elevenlabs.io</strong><br>
              2. Go to <strong>Voice Library</strong> → search for a character → click <strong>Add to My Voices</strong><br>
              3. Copy your API key from <strong>Profile → API Keys</strong>
            </p>
          </div>
        </div>

        ${hasKey && voices.length > 0 ? `
          <div class="section-card">
            <div class="section-label">Voice Assignments <span style="font-size:11px;font-weight:400;color:var(--muted)">(${voices.length} voices loaded)</span></div>
            ${CHARACTERS.map(ch => `
              <div class="trait-row" style="flex-direction:column;gap:2px">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:18px">${ch.emoji}</span>
                  <span style="font-size:13px;font-weight:600">${ch.name}</span>
                  ${state.charVoiceMap[ch.id] ? '<span class="el-badge">🎙 EL</span>' : ''}
                </div>
                <select class="voice-select" data-action="set-voice" data-id="${ch.id}">
                  <option value="">— Use browser voice —</option>
                  ${voices.map(v => `<option value="${v.voice_id}" ${state.charVoiceMap[ch.id]===v.voice_id?'selected':''}>${v.name}${v.labels?.accent ? ' · ' + v.labels.accent : ''}</option>`).join('')}
                </select>
              </div>
            `).join('')}
          </div>
        ` : hasKey ? `
          <div class="section-card">
            <div class="trait-row" style="border-top:none">
              <p style="font-size:13px;color:var(--muted)">Click "Refresh Voices" above to load your ElevenLabs voice library.</p>
            </div>
          </div>
        ` : ''}

        <div class="spacer"></div>
      </div>
    </div>
  </div>`;
}

// ─── SHEET ───────────────────────────────────────────────────────────────────

function renderSheetOverlay() {
  return `<div class="sheet-overlay" data-action="close-sheet">
    <div class="sheet" data-action="noop">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <button class="close-btn" data-action="close-sheet">Close</button>
        <div class="sheet-title">${state.sheet.char.name}</div>
        <div class="phase-dots">
          ${['tips','listen','record','result'].map((p,i) =>
            `<div class="phase-dot ${phaseIndex()>=i?'active':''}"></div>`
          ).join('')}
        </div>
      </div>
      ${renderSheetBody()}
    </div>
  </div>`;
}

function phaseIndex() {
  return {tips:0, listen:1, record:2, analyzing:2, result:3}[state.sheet.phase];
}

function renderSheet() {
  const overlay = document.querySelector('.sheet-overlay');
  if (!overlay) return;
  const sheet = overlay.querySelector('.sheet');
  const body = sheet.querySelector('.sheet-body');
  if (body) {
    body.outerHTML = renderSheetBody();
  } else {
    sheet.innerHTML = `<div class="sheet-handle"></div>
      <div class="sheet-header">
        <button class="close-btn" data-action="close-sheet">Close</button>
        <div class="sheet-title">${state.sheet.char.name}</div>
        <div class="phase-dots">
          ${['tips','listen','record','result'].map((p,i) =>
            `<div class="phase-dot ${phaseIndex()>=i?'active':''}"></div>`
          ).join('')}
        </div>
      </div>
      ${renderSheetBody()}`;
  }
  if (state.sheet?.phase === 'record' && state.isRecording) startWaveform();
  if (state.sheet?.phase === 'result') animateScoreRing(state.sheet.result.overall);
}

function renderSheetBody() {
  const { char, phase } = state.sheet;
  switch (phase) {
    case 'tips':      return renderTips(char);
    case 'listen':    return renderListen(char);
    case 'record':    return renderRecord(char);
    case 'analyzing': return renderAnalyzing();
    case 'result':    return renderResult(char);
  }
}

function renderTips(char) {
  const diffColor = {beginner:'var(--green)',intermediate:'var(--orange)',advanced:'var(--red)'}[char.difficulty];
  return `<div class="sheet-body tips-body">
    <div class="char-hero">
      <div class="emoji">${char.emoji}</div>
      <h2>${char.name}</h2>
      <span class="diff-badge" style="background:${diffColor}20;color:${diffColor}">${char.difficulty}</span>
    </div>
    <div class="section-card">
      <div class="section-label">Voice Key</div>
      ${char.voiceTraits.map(t => `
        <div class="trait-row">
          <div class="trait-icon">${t.icon}</div>
          <div><div class="trait-name">${t.name}</div><div class="trait-desc">${t.desc}</div></div>
        </div>`).join('')}
    </div>
    <div class="section-card">
      <div class="section-label">You'll Practice</div>
      ${char.phrases.map(p => `<div class="phrase-row">💬 "${p.text}"</div>`).join('')}
    </div>
    <div class="spacer"></div>
    <button class="full-btn" data-action="next-phase">Let's Listen →</button>
    <div class="spacer"></div>
  </div>`;
}

function renderListen(char) {
  const idx = state.sheet.phraseIdx ?? 0;
  const phrase = char.phrases[idx];
  const playCount = state.sheet.playCount ?? 0;
  const isLoading = !!state.sheet.isLoading;
  const hasElVoice = !!(state.apiKey && state.charVoiceMap[char.id]);

  return `<div class="sheet-body listen-body">
    <h2>Listen carefully</h2>
    <div style="font-size:56px">${char.emoji}</div>
    <div class="phrase-card">
      <div class="phrase-text">"${phrase.text}"</div>
      ${phrase.hint ? `<div class="phrase-hint">💡 ${phrase.hint}</div>` : ''}
    </div>
    ${isLoading
      ? `<div class="loading-audio"><div class="spinner"></div> Generating voice…</div>`
      : `<button class="play-btn ${state.sheet.isPlaying?'playing':''}" data-action="play-phrase">
          <svg viewBox="0 0 24 24" fill="currentColor">
            ${state.sheet.isPlaying
              ? '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>'
              : '<polygon points="5,3 19,12 5,21"/>'}
          </svg>
          ${state.sheet.isPlaying ? 'Playing…' : playCount === 0 ? 'Play Reference' : 'Play Again'}
        </button>`
    }
    ${hasElVoice ? `<div class="el-badge" style="margin-top:-8px">🎙 ElevenLabs voice</div>` : ''}
    ${playCount > 0 ? `<div class="play-count">Heard ${playCount}× — ready when you are!</div>` : ''}
    <div style="flex:1"></div>
    <button class="full-btn" data-action="next-phase" ${playCount===0?'disabled':''}>I'm Ready to Record →</button>
    <div class="spacer"></div>
  </div>`;
}

function renderRecord(char) {
  const idx = state.sheet.phraseIdx ?? 0;
  const phrase = char.phrases[idx];
  const dur = state.recDuration.toFixed(1);
  return `<div class="sheet-body record-body">
    <h2>Your turn</h2>
    <div class="phrase-text">"${phrase.text}"</div>
    <canvas id="waveCanvas" class="waveform-canvas" width="360" height="60"></canvas>
    ${state.isRecording ? `<div class="timer">${dur}s</div>` : ''}
    <button class="mic-btn ${state.isRecording?'recording':'idle'}" data-action="toggle-record">
      ${state.isRecording ? '⏹' : '🎙️'}
    </button>
    ${!state.isRecording && state.recordingBlob ? `
      <div class="post-record-actions">
        <button class="ghost-btn" data-action="play-back">▶ Listen back</button>
        <button class="ghost-btn" data-action="reset-record">↩ Re-record</button>
      </div>
      <button class="full-btn" data-action="analyze">Analyze My Impression →</button>
    ` : ''}
    <div class="spacer"></div>
  </div>`;
}

function renderAnalyzing() {
  return `<div class="sheet-body analyzing-body">
    <div class="analyze-icon">🎙️</div>
    <h2>Analyzing...</h2>
    <p>Comparing pitch, energy, and rhythm</p>
  </div>`;
}

function renderResult(char) {
  const { result, xpEarned, isNew } = state.sheet;
  const passed = result.overall >= REQUIRED_SCORE[char.difficulty];
  const idx = state.sheet.phraseIdx ?? 0;
  const hasNext = idx < char.phrases.length - 1;
  const circumference = 2 * Math.PI * 54;
  return `<div class="sheet-body result-body">
    <div class="result-header">
      <div class="result-emoji">${passed ? '🎉' : '💪'}</div>
      <h2>${passed ? 'Nailed it!' : 'Keep practicing!'}</h2>
      ${isNew ? '<span class="new-best-badge">New personal best!</span>' : ''}
    </div>
    <div class="score-ring-wrap">
      <svg class="score-ring" viewBox="0 0 140 140">
        <circle class="score-ring-bg" cx="70" cy="70" r="54"/>
        <circle id="scoreRingFill" class="score-ring-fill" cx="70" cy="70" r="54"
          stroke="${result.overall>=80?'var(--green)':result.overall>=60?'var(--yellow)':'var(--red)'}"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${circumference}"/>
        <text id="scoreText" class="score-ring-text" x="70" y="68">0</text>
        <text class="score-ring-sub" x="70" y="86">/ 100</text>
      </svg>
    </div>
    <div class="xp-earned-pill">⭐ +${xpEarned} XP earned</div>
    <div class="score-breakdown">
      ${scoreRow('🎵','Pitch', result.pitchScore)}
      ${scoreRow('🔊','Energy', result.energyScore)}
      ${scoreRow('⏱','Rhythm', result.rhythmScore)}
    </div>
    <div class="feedback-card">
      <h4>Feedback</h4>
      ${result.feedback.map(f => `<div class="feedback-item"><span>💡</span><span>${f}</span></div>`).join('')}
    </div>
    <div class="result-actions">
      ${hasNext ? `<button class="primary-btn" data-action="next-phrase">Next Phrase →</button>` : ''}
    </div>
    <div class="action-row">
      <button class="secondary-btn" data-action="try-again">↩ Try Again</button>
      <button class="secondary-btn" data-action="close-sheet">${passed?'Done ✓':'Quit'}</button>
    </div>
    <div class="spacer"></div>
  </div>`;
}

function scoreRow(icon, label, score) {
  const color = score>=80?'var(--green)':score>=60?'var(--yellow)':'var(--red)';
  return `<div class="score-row">
    <span class="score-icon">${icon}</span>
    <span class="score-label">${label}</span>
    <div class="score-bar-wrap"><div class="score-bar" style="width:${score}%;background:${color}"></div></div>
    <span class="score-num">${score}</span>
  </div>`;
}

function animateScoreRing(score) {
  const el = document.getElementById('scoreRingFill');
  const txt = document.getElementById('scoreText');
  if (!el || !txt) return;
  const c = 2 * Math.PI * 54;
  const offset = c - (score / 100) * c;
  setTimeout(() => {
    el.style.strokeDashoffset = offset;
    let cur = 0;
    const step = score / 60;
    const t = setInterval(() => {
      cur = Math.min(score, cur + step);
      if (txt) txt.textContent = Math.round(cur);
      if (cur >= score) clearInterval(t);
    }, 16);
  }, 200);
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────

function attachEventListeners() {
  const app = document.getElementById('app');
  app.addEventListener('click', handleClick);
  app.addEventListener('change', handleChange);
}

function handleChange(e) {
  if (e.target.dataset.action === 'set-voice') {
    setCharVoice(e.target.dataset.id, e.target.value);
  }
}

async function handleClick(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'tab') {
    state.tab = btn.dataset.tab;
    render(); return;
  }

  if (action === 'open-settings') {
    state.settings = true;
    state.settingsError = '';
    render(); return;
  }

  if (action === 'close-settings') {
    state.settings = false;
    render(); return;
  }

  if (action === 'connect-el') {
    const key = document.getElementById('elApiKeyInput')?.value?.trim() || '';
    if (!key) { state.settingsError = 'Please enter an API key.'; render(); return; }
    await connectElevenLabs(key); return;
  }

  if (action === 'open-char') {
    const char = CHARACTERS.find(c => c.id === btn.dataset.id);
    if (!char || !isUnlocked(char)) return;
    state.sheet = { char, phase:'tips', phraseIdx:0, playCount:0, isPlaying:false, isLoading:false };
    state.recordingBlob = null; state.isRecording = false; state.recDuration = 0;
    render(); return;
  }

  if (action === 'close-sheet') {
    stopAudio();
    if (state.isRecording) stopRecording();
    cancelAnimationFrame(state.canvasRAF);
    state.sheet = null;
    render(); return;
  }

  if (action === 'next-phase') {
    if (state.sheet.phase === 'tips') state.sheet.phase = 'listen';
    else if (state.sheet.phase === 'listen') state.sheet.phase = 'record';
    renderSheet(); return;
  }

  if (action === 'play-phrase') {
    if (state.sheet.isPlaying || state.sheet.isLoading) {
      stopAudio();
      state.sheet.isPlaying = false;
      state.sheet.isLoading = false;
      renderSheet(); return;
    }
    const hasElVoice = !!(state.apiKey && state.charVoiceMap[state.sheet.char.id]);
    state.sheet.isPlaying = true;
    state.sheet.isLoading = hasElVoice && !state.audioCache[`${state.sheet.char.id}_${state.sheet.phraseIdx}`];
    state.sheet.playCount = (state.sheet.playCount || 0) + 1;
    renderSheet();
    try {
      await speakPhrase(state.sheet.char, state.sheet.phraseIdx);
    } catch (err) {
      if (state.sheet) { state.sheet.isPlaying = false; state.sheet.isLoading = false; }
    }
    if (state.sheet) state.sheet.isLoading = false;
    renderSheet(); return;
  }

  if (action === 'toggle-record') {
    if (state.isRecording) stopRecording();
    else await startRecording();
    return;
  }

  if (action === 'play-back') {
    if (state.recordingBlob) {
      const url = URL.createObjectURL(state.recordingBlob);
      new Audio(url).play();
    }
    return;
  }

  if (action === 'reset-record') {
    state.recordingBlob = null; state.recDuration = 0;
    renderSheet(); return;
  }

  if (action === 'analyze') {
    state.sheet.phase = 'analyzing';
    renderSheet();
    const result = await analyzeRecording(state.sheet.char);
    if (!result) { state.sheet.phase = 'record'; renderSheet(); return; }
    const { xp, isNew } = recordResult(state.sheet.char, result.overall);
    state.sheet.result = result;
    state.sheet.xpEarned = xp;
    state.sheet.isNew = isNew;
    state.sheet.phase = 'result';
    state.progress = loadProgress();
    renderSheet(); return;
  }

  if (action === 'try-again') {
    state.recordingBlob = null; state.recDuration = 0;
    state.sheet.phase = 'record';
    renderSheet(); return;
  }

  if (action === 'next-phrase') {
    state.sheet.phraseIdx++;
    state.recordingBlob = null; state.recDuration = 0;
    state.sheet.phase = 'record';
    renderSheet(); return;
  }
}

// ─── BOOT ────────────────────────────────────────────────────────────────────

attachEventListeners();
render();
</script>
</body>
</html>
